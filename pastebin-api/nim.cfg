# Memory management for the multithreaded HTTP server (see webframework/docs/PERFORMANCE.md):
#   atomicArc = deterministic ref-counting with ATOMIC counts, so it is thread-safe across the
#     worker pool. --mm:orc was NOT: its cycle collector keeps a process-global registry that every
#     worker mutates unsynchronised while freeing per-request (closure) objects -> a data race that
#     faulted into intermittent SIGSEGVs under concurrency (and aarch64's weaker memory ordering
#     makes the Pi more exposed than an x86 dev box). atomicArc drops the cycle collector; the
#     request path is acyclic, so nothing leaks (RSS stays flat under sustained load).
#   useMalloc = hand memory back to libc/OS instead of Nim's page pooling (low, predictable RSS).
--mm:atomicArc
-d:useMalloc

# Threads are required: the HTTP framework runs a worker thread pool.
--threads:on

# std/httpclient talks to ntfy.sh over HTTPS (loads libssl/libcrypto at runtime).
-d:ssl

# The HTTP framework now lives at the repo root (../webframework), extracted out of this tree.
# Add the repo root to the search path so `import webframework/...` resolves there.
--path:".."
