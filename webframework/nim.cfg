# This framework runs a pool of worker threads, so anything built against it needs thread-safe
# memory management. --mm:orc is UNSAFE here: its cycle collector keeps a process-global registry
# that the workers mutate unsynchronised while freeing per-request objects, which races into
# intermittent SIGSEGVs under load (see docs/PERFORMANCE.md). --mm:atomicArc uses atomic refcounts
# and no cycle collector; the request path is acyclic so nothing leaks. Threads are on by default
# in Nim 2.x but pinned here for clarity / older toolchains.
#
# (An explicit `--mm:` on the command line still overrides this — bench/build.sh does that to build
# the deliberately-unsafe orc variant used to demonstrate the race.)
--mm:atomicArc
--threads:on
