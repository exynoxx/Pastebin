# Predictable, low RSS on the Pi (mirrors docs/nim-backend-plan.md):
#   orc  = deterministic cycle-collecting GC, low idle footprint
#   useMalloc = hand memory back to libc/OS instead of Nim's page pooling
--mm:orc
-d:useMalloc

# Threads are required: Mummy runs a worker thread pool.
--threads:on

# std/httpclient talks to ntfy.sh over HTTPS (loads libssl/libcrypto at runtime).
-d:ssl
