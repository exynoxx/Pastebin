# nginx serves the React build directly from disk (no Node/serve container) and
# reverse-proxies the API. It serves PLAIN HTTP on :80 only — public TLS is terminated
# upstream by Tailscale Funnel, which reverse-proxies to http://<pi>:80. nginx no longer
# holds a cert (none needed) and does NOT redirect to https (that would loop behind the
# funnel). For LAN/funnel health checks, /health answers directly.
upstream backend {
    server pastebin-api:8080;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    server_tokens off;

    # Security headers (shared snippet). Re-included in every location that sets its own
    # add_header, because nginx add_header does NOT inherit once a block declares any.
    include /etc/nginx/security-headers.conf;

    # gzip static assets on the fly — cheap CPU, much less to push over the LAN/WAN.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    client_max_body_size 1024M;        # match MAX_REQUEST_BYTES (1 GB)

    # Backend API - Nim API
    location /api/ {
        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Stream large uploads/downloads straight through instead of buffering them
        # (keeps nginx memory/disk flat and lets the API enforce the real size cap).
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_body_timeout 600s;

        include /etc/nginx/security-headers.conf;   # local add_headers below would drop them otherwise

        # CORS headers (backup - should be handled by API)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Long-cache fingerprinted static assets.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Health check endpoint
    location /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # SPA fallback — serve index.html for client-side routes. The HTML shell is marked
    # no-cache so a fresh build's fingerprinted asset hashes are picked up immediately;
    # the /static assets themselves stay immutable (cached 1y above), so this is cheap.
    location / {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
