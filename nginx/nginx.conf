# nginx serves the React build directly from disk (no Node/serve container) and
# reverse-proxies the API. It serves PLAIN HTTP on :80 only — public TLS is terminated
# upstream by Tailscale Funnel, which reverse-proxies to http://<pi>:80. nginx no longer
# holds a cert (none needed) and does NOT redirect to https (that would loop behind the
# funnel). For LAN/funnel health checks, /health answers directly.
upstream backend {
    server pastebin-api:8080;
}

# --- Edge admission control (burst backpressure) ---------------------------------
# The API runs on a small fixed worker pool on a Pi. Without a front-line limit, a
# burst of concurrent requests (especially slow creates/uploads) fills the backend's
# accept queue faster than it drains: requests never reach the app's concurrency
# middleware to get a fast 503, so clients see multi-second TIMEOUTS and even cheap
# reads starve. We shed at the edge instead: excess requests get an immediate 503,
# and writes are capped BELOW the read lane so an upload/create flood can never
# consume every worker and take reads down with it.
#
# Zones are global (single small instance): the key is a constant, so one bucket
# governs the whole box rather than per-client buckets (a single client can flood).
map $host $conn_all   { default all; }              # constant key -> one global bucket
map $request_method $conn_write { POST wr; default ""; }  # only POST is counted; "" = uncounted
limit_conn_zone $conn_all   zone=api_all:1m;
limit_conn_zone $conn_write zone=api_write:1m;
limit_conn_status 503;      # excess concurrent requests -> instant 503 (not a timeout)

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    server_tokens off;

    # Security headers (shared snippet). Re-included in every location that sets its own
    # add_header, because nginx add_header does NOT inherit once a block declares any.
    include /etc/nginx/security-headers.conf;

    # gzip static assets on the fly — cheap CPU, much less to push over the LAN/WAN.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Reject oversize uploads on Content-Length before any body is read, so a big upload can't
    # stream through and thrash the Pi's SD-card-backed temp/swap. ~51 MB = the 50 MB file limit
    # plus multipart-envelope headroom. Keep in sync with the API's MAX_REQUEST_BYTES.
    client_max_body_size 51M;

    # Backend API - Nim API
    location /api/ {
        # Edge admission control: shed bursts with a fast 503 instead of queueing them
        # until the backend's worker pool starves (which surfaces as client timeouts).
        #  - api_all: hard ceiling on TOTAL concurrent API requests the box will accept.
        #  - api_write: POSTs are capped well below api_all AND below the backend worker
        #    count, so a create/upload flood always leaves workers free to serve reads.
        # (GETs carry an empty api_write key, so they are limited only by api_all.)
        limit_conn api_all 30;
        limit_conn api_write 3;

        proxy_pass http://backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Stream large uploads/downloads straight through instead of buffering them
        # (keeps nginx memory/disk flat and lets the API enforce the real size cap).
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_body_timeout 600s;

        include /etc/nginx/security-headers.conf;

        # No CORS headers: the SPA is served same-origin with this API (relative /api base),
        # so it needs none. Omitting Access-Control-Allow-* means browsers block cross-origin
        # JS access by default. Direct navigations (raw links, downloads) are unaffected.
    }

    # Long-cache fingerprinted static assets.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Health check endpoint
    location /health {
        access_log off;
        default_type text/plain;
        return 200 "healthy\n";
    }

    # SPA fallback — serve index.html for client-side routes. The HTML shell is marked
    # no-cache so a fresh build's fingerprinted asset hashes are picked up immediately;
    # the /static assets themselves stay immutable (cached 1y above), so this is cheap.
    location / {
        include /etc/nginx/security-headers.conf;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;

    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
