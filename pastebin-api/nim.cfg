# Memory management for the multithreaded HTTP server
--mm:atomicArc
-d:useMalloc
--threads:on

# std/httpclient talks to ntfy.sh over HTTPS (loads libssl/libcrypto at runtime).
-d:ssl

# The HTTP framework now lives at the repo root (../webframework), extracted out of this tree.
# Add the repo root to the search path so `import webframework/...` resolves there.
--path:".."

# Add src/ to the search path so `referencing <module>` (from common/templates) can resolve a bare
# service-module name (e.g. `from blobstore import nil`) even from nested endpoint files.
--path:"src"
