# Shared security headers. nginx `add_header` does NOT merge across blocks: the moment a
# location declares its own add_header, it stops inheriting the server-level ones. So this
# snippet is `include`d in the server block AND in every location that sets its own headers
# (e.g. Cache-Control), guaranteeing these apply everywhere.
#
# No HSTS here — TLS is terminated upstream by Tailscale Funnel; an HSTS header from a
# plain-HTTP origin is meaningless. Tailscale sets transport security for the *.ts.net host.
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "no-referrer-when-downgrade" always;
add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
